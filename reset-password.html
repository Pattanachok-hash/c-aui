<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้ง Password ใหม่ — C-Aui Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap">
    <link rel="stylesheet" href="/css/portal.css">
    <style>
        .rp-card {
            width: 100%;
            max-width: 440px;
            animation: card-rise .5s cubic-bezier(.22,.61,.36,1);
        }
        @keyframes card-rise {
            from { opacity: 0; transform: translateY(20px) scale(.98); }
            to   { opacity: 1; transform: translateY(0)    scale(1); }
        }
        .header-block { text-align: center; margin-bottom: 24px; }
        .center-info { text-align: center; padding: 12px 0; }
        .info-icon {
            width: 64px; height: 64px;
            margin: 0 auto 16px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px;
            box-shadow: 0 12px 32px rgba(0,0,0,.18);
            animation: pop-in .55s cubic-bezier(.34, 1.56, .64, 1);
        }
        .info-icon.success { background: linear-gradient(135deg, #16a34a, #22c55e); color: #fff; box-shadow: 0 12px 32px rgba(22,163,74,.35); }
        .info-icon.error   { background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff; box-shadow: 0 12px 32px rgba(239,68,68,.35); }
        @keyframes pop-in {
            0%   { transform: scale(0)    rotate(-30deg); opacity: 0; }
            60%  { transform: scale(1.15) rotate(8deg);   opacity: 1; }
            100% { transform: scale(1)    rotate(0); }
        }
        .info-title { font-size: 1.15rem; font-weight: 800; margin-bottom: 8px; }
        .info-msg   { color: var(--gray-600); font-size: .9rem; line-height: 1.55; }
    </style>
</head>
<body>
    <div class="center-screen">
        <div class="rp-card">
            <div class="header-block">
                <div class="brand-badge">SMART EXPORT</div>
                <div class="brand-subtitle">ตั้ง Password ใหม่</div>
            </div>

            <!-- Form (shown when token is present in URL) -->
            <div class="card" id="form-card" style="display:none">
                <p style="color:var(--gray-600);font-size:.88rem;line-height:1.55;margin-bottom:1rem">
                    ตั้ง password ใหม่สำหรับบัญชีของคุณ
                </p>

                <div id="alert-box"></div>
                <div class="form-group">
                    <label>Password ใหม่</label>
                    <input type="password" id="new-password" placeholder="••••••••" autocomplete="new-password" autofocus>
                    <div class="pw-rules">
                        <div class="pw-rules-title">เงื่อนไข Password:</div>
                        <div class="pw-rule fail" id="rule-length"><span class="icon"></span>ความยาวอย่างน้อย 8 ตัวอักษร</div>
                        <div class="pw-rule fail" id="rule-number"><span class="icon"></span>มีตัวเลขอย่างน้อย 1 ตัว (0-9)</div>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:1.25rem">
                    <label>ยืนยัน Password</label>
                    <input type="password" id="confirm-password" placeholder="••••••••" autocomplete="new-password">
                </div>
                <button class="btn btn-primary btn-block" id="btn-save">บันทึก Password ใหม่</button>
            </div>

            <!-- Missing token -->
            <div class="card" id="error-card" style="display:none">
                <div class="center-info">
                    <div class="info-icon error">✗</div>
                    <div class="info-title">ลิงก์ไม่ถูกต้อง</div>
                    <p class="info-msg">
                        ไม่พบ token ในลิงก์ — กรุณาขอลิงก์ใหม่
                    </p>
                    <a href="/forgot-password.html" class="btn btn-primary btn-block" style="margin-top:20px">ขอลิงก์ใหม่</a>
                </div>
            </div>

            <!-- Success -->
            <div class="card" id="success-card" style="display:none">
                <div class="center-info">
                    <div class="info-icon success">✓</div>
                    <div class="info-title">เปลี่ยน Password สำเร็จ</div>
                    <p class="info-msg">กำลังพาคุณไปหน้า Login...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        const formCard    = document.getElementById('form-card');
        const errorCard   = document.getElementById('error-card');
        const successCard = document.getElementById('success-card');

        if (!token) {
            errorCard.style.display = '';
        } else {
            formCard.style.display = '';
        }

        // Real-time password rules
        const newEl = document.getElementById('new-password');
        const ruleLength = document.getElementById('rule-length');
        const ruleNumber = document.getElementById('rule-number');
        if (newEl) {
            newEl.addEventListener('input', () => {
                const v = newEl.value;
                ruleLength.classList.toggle('pass', v.length >= 8);
                ruleLength.classList.toggle('fail', v.length < 8);
                const hasDigit = /\d/.test(v);
                ruleNumber.classList.toggle('pass', hasDigit);
                ruleNumber.classList.toggle('fail', !hasDigit);
            });
        }

        const btn = document.getElementById('btn-save');
        const confEl = document.getElementById('confirm-password');

        async function doSave() {
            clearAlert('alert-box');
            const pw = newEl.value, c = confEl.value;
            if (pw.length < 8)  { showAlert('alert-box', 'Password ต้องมีอย่างน้อย 8 ตัวอักษร'); return; }
            if (!/\d/.test(pw)) { showAlert('alert-box', 'Password ต้องมีตัวเลขอย่างน้อย 1 ตัว'); return; }
            if (pw !== c)       { showAlert('alert-box', 'Password ไม่ตรงกัน'); return; }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> กำลังบันทึก...';
            try {
                await api.post('/api/auth/reset-password', { token, new_password: pw });
                formCard.style.display = 'none';
                successCard.style.display = '';
                setTimeout(() => { window.location.href = '/login.html'; }, 1800);
            } catch (e) {
                showAlert('alert-box', e.message || 'บันทึก password ไม่สำเร็จ');
                btn.disabled = false;
                btn.textContent = 'บันทึก Password ใหม่';
            }
        }

        if (btn) {
            btn.addEventListener('click', doSave);
            confEl.addEventListener('keydown', e => { if (e.key === 'Enter') doSave(); });
        }
    </script>
</body>
</html>
