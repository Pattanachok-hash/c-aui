<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลืม Password — C-Aui Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap">
    <link rel="stylesheet" href="/css/portal.css">
    <style>
        .fp-card {
            width: 100%;
            max-width: 400px;
            animation: card-rise .5s cubic-bezier(.22,.61,.36,1);
        }
        @keyframes card-rise {
            from { opacity: 0; transform: translateY(20px) scale(.98); }
            to   { opacity: 1; transform: translateY(0)    scale(1); }
        }
        .header-block { text-align: center; margin-bottom: 24px; }
        .back-link {
            text-align: center;
            margin-top: 18px;
            font-size: .86rem;
            color: var(--gray-600);
        }
        .back-link a { color: var(--dhl-red); font-weight: 700; text-decoration: none; }
        .back-link a:hover { text-decoration: underline; }

        .success-screen { text-align: center; padding: 12px 0; }
        .success-icon {
            width: 64px; height: 64px;
            margin: 0 auto 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFCC00, #ff8f00);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 30px;
            box-shadow: 0 12px 32px rgba(245,158,11,.35);
            animation: pop-in .55s cubic-bezier(.34, 1.56, .64, 1);
        }
        @keyframes pop-in {
            0%   { transform: scale(0)    rotate(-30deg); opacity: 0; }
            60%  { transform: scale(1.15) rotate(8deg);   opacity: 1; }
            100% { transform: scale(1)    rotate(0); }
        }
        .success-title { font-size: 1.15rem; font-weight: 800; margin-bottom: 8px; }
        .success-msg   { color: var(--gray-600); font-size: .9rem; line-height: 1.55; }
    </style>
</head>
<body>
    <div class="center-screen">
        <div class="fp-card">
            <div class="header-block">
                <div class="brand-badge">SMART EXPORT</div>
                <div class="brand-subtitle">รีเซ็ต Password</div>
            </div>

            <!-- Form -->
            <div class="card" id="form-card">
                <p style="color:var(--gray-600);font-size:.88rem;line-height:1.55;margin-bottom:1rem">
                    กรอก email ที่ใช้สมัคร — ระบบจะส่งลิงก์รีเซ็ต password ไปให้
                </p>

                <div id="alert-box"></div>
                <div class="form-group" style="margin-bottom:1.25rem">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="you@example.com" autofocus autocomplete="username">
                </div>
                <button class="btn btn-primary btn-block" id="btn-send">ส่งลิงก์รีเซ็ต</button>

                <div class="back-link">
                    <a href="/login.html">← กลับสู่หน้า Login</a>
                </div>
            </div>

            <!-- Success -->
            <div class="card" id="success-card" style="display:none">
                <div class="success-screen">
                    <div class="success-icon">📧</div>
                    <div class="success-title">ส่งลิงก์เรียบร้อย</div>
                    <p class="success-msg">
                        กรุณาตรวจ email ของคุณ<br>
                        คลิกลิงก์ใน email เพื่อตั้ง password ใหม่<br>
                        <span style="color:var(--gray-400);font-size:.78rem">(ลิงก์มีอายุ 1 ชั่วโมง)</span>
                    </p>
                    <a href="/login.html" class="btn btn-secondary btn-block" style="margin-top:20px">กลับสู่หน้า Login</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        const btn = document.getElementById('btn-send');
        const emailEl = document.getElementById('email');

        async function doSend() {
            clearAlert('alert-box');
            const email = emailEl.value.trim().toLowerCase();
            if (!isValidPortalEmail(email)) {
                showAlert('alert-box', 'กรุณากรอก email ให้ถูกต้อง');
                return;
            }
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> กำลังส่ง...';
            try {
                // Backend always returns success — doesn't reveal whether email exists
                await api.post('/api/auth/forgot-password', { email });
                document.getElementById('form-card').style.display = 'none';
                document.getElementById('success-card').style.display = '';
            } catch (e) {
                showAlert('alert-box', e.message || 'ส่งลิงก์ไม่สำเร็จ');
                btn.disabled = false;
                btn.textContent = 'ส่งลิงก์รีเซ็ต';
            }
        }

        btn.addEventListener('click', doSend);
        emailEl.addEventListener('keydown', e => { if (e.key === 'Enter') doSend(); });
    </script>
</body>
</html>
