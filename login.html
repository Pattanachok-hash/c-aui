<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DSC Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap">
    <link rel="stylesheet" href="/css/portal.css">
    <style>
        .login-card {
            width: 100%;
            max-width: 440px;
            position: relative;
            padding-top: 88px;
            animation: card-rise .5s cubic-bezier(.22,.61,.36,1);
        }
        @keyframes card-rise {
            from { opacity: 0; transform: translateY(20px) scale(.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .login-card .card {
            border-radius: 24px;
            padding: 44px 32px 32px;
            overflow: visible;
        }
        .panda-lounge {
            position: absolute;
            top: 0;
            left: 50%;
            width: 220px;
            height: 132px;
            transform: translateX(-50%);
            z-index: 3;
            pointer-events: none;
        }
        .panda-head {
            position: absolute;
            left: 50%;
            top: 12px;
            width: 132px;
            height: 108px;
            transform: translateX(-50%);
            background: #fffaf0;
            border-radius: 52% 52% 46% 46%;
            box-shadow: 0 12px 28px rgba(17,24,39,.12);
        }
        .panda-ear {
            position: absolute;
            top: 6px;
            width: 48px;
            height: 48px;
            background: #1f1f1f;
            border-radius: 50%;
            z-index: -1;
        }
        .panda-ear.left { left: 34px; }
        .panda-ear.right { right: 34px; }
        .panda-eye-patch {
            position: absolute;
            top: 38px;
            width: 34px;
            height: 42px;
            background: #232323;
            border-radius: 50%;
            transform: rotate(12deg);
        }
        .panda-eye-patch.left { left: 29px; }
        .panda-eye-patch.right { right: 29px; transform: rotate(-12deg); }
        .panda-eye {
            position: absolute;
            top: 11px;
            left: 10px;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: #fff;
            box-shadow: inset -3px -3px 0 #6b3f22;
        }
        .panda-eye::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 3px;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #fff;
        }
        .panda-nose {
            position: absolute;
            left: 50%;
            top: 69px;
            width: 22px;
            height: 15px;
            transform: translateX(-50%);
            background: #171717;
            border-radius: 48% 48% 58% 58%;
        }
        .panda-mouth {
            position: absolute;
            left: 50%;
            top: 87px;
            width: 24px;
            height: 10px;
            transform: translateX(-50%);
            border-bottom: 3px solid #3f1d1d;
            border-radius: 0 0 999px 999px;
        }
        .panda-arm {
            position: absolute;
            top: 104px;
            width: 86px;
            height: 34px;
            background: #252525;
            border-radius: 999px;
            box-shadow: 0 9px 18px rgba(17,24,39,.14);
        }
        .panda-arm.left {
            left: 6px;
            transform: rotate(7deg);
        }
        .panda-arm.right {
            right: 6px;
            transform: rotate(-7deg);
        }
        .login-title {
            text-align: center;
            color: var(--gray-900);
            font-size: 1.05rem;
            font-weight: 900;
            margin-bottom: 22px;
        }
        .signup-link {
            text-align: center;
            margin-top: 18px;
            font-size: .86rem;
            color: var(--gray-600);
        }
        .signup-link a {
            color: var(--dhl-red);
            font-weight: 700;
            text-decoration: none;
        }
        .signup-link a:hover { text-decoration: underline; }
        @media (max-width: 480px) {
            .login-card { padding-top: 76px; }
            .login-card .card { padding: 38px 22px 28px; }
            .panda-lounge {
                width: 190px;
                height: 118px;
                transform: translateX(-50%) scale(.9);
                transform-origin: top center;
            }
        }
    </style>
</head>
<body>
    <div class="center-screen">
        <div class="login-card">
            <div class="panda-lounge" aria-hidden="true">
                <div class="panda-ear left"></div>
                <div class="panda-ear right"></div>
                <div class="panda-head">
                    <div class="panda-eye-patch left"><span class="panda-eye"></span></div>
                    <div class="panda-eye-patch right"><span class="panda-eye"></span></div>
                    <div class="panda-nose"></div>
                    <div class="panda-mouth"></div>
                </div>
                <div class="panda-arm left"></div>
                <div class="panda-arm right"></div>
            </div>

            <div class="card">
                <div class="login-title">Smart Export Login</div>
                <div id="alert-box"></div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="you@example.com" autofocus autocomplete="username">
                </div>
                <div class="form-group" style="margin-bottom:.75rem">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                </div>
                <div style="text-align:right;margin-bottom:1.25rem">
                    <a href="/forgot-password.html" style="font-size:.8rem;color:var(--gray-500);text-decoration:none">ลืม password?</a>
                </div>
                <button class="btn btn-primary btn-block" id="btn-login">เข้าสู่ระบบ</button>

                <div class="signup-link">
                    ยังไม่มีบัญชี? <a href="/signup.html">สมัครที่นี่</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        // If already logged in, bounce to portal.
        (async () => {
            if (await getCurrentSession()) {
                window.location.href = '/';
            }
        })();

        const btn = document.getElementById('btn-login');
        const emailEl = document.getElementById('email');
        const passwordEl = document.getElementById('password');

        async function doLogin() {
            clearAlert('alert-box');
            const email = emailEl.value.trim();
            const password = passwordEl.value;
            if (!email || !password) {
                showAlert('alert-box', 'กรุณากรอก email และ password');
                return;
            }
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> กำลังเข้าสู่ระบบ...';
            try {
                await login(email, password);
                window.location.href = '/';
            } catch (e) {
                showAlert('alert-box', e.message || 'เข้าสู่ระบบไม่สำเร็จ');
                btn.disabled = false;
                btn.textContent = 'เข้าสู่ระบบ';
            }
        }

        btn.addEventListener('click', doLogin);
        passwordEl.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
        emailEl.addEventListener('keydown', e => { if (e.key === 'Enter') passwordEl.focus(); });
    </script>
</body>
</html>
