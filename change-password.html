<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password — DSC Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap">
    <link rel="stylesheet" href="/css/portal.css">
    <style>
        .cp-card {
            width: 100%;
            max-width: 460px;
            animation: card-rise .5s cubic-bezier(.22,.61,.36,1);
        }
        @keyframes card-rise {
            from { opacity: 0; transform: translateY(20px) scale(.98); }
            to   { opacity: 1; transform: translateY(0)    scale(1); }
        }
        .header-block { text-align: center; margin-bottom: 24px; }
        .cp-actions {
            display: flex; gap: .5rem; margin-top: 12px;
        }
        .cp-actions .btn { flex: 1; }
    </style>
</head>
<body>
    <div id="topbar"></div>
    <div class="center-screen" style="min-height:calc(100vh - 70px)">
        <div class="cp-card">
            <div class="header-block">
                <h1 style="font-size:1.4rem;font-weight:800;color:var(--gray-900);margin-bottom:6px">เปลี่ยน Password</h1>
                <p style="color:var(--gray-600);font-size:.85rem">Email: <strong id="user-email-label">—</strong></p>
            </div>

            <div class="card">
                <div id="alert-box"></div>
                <div class="form-group">
                    <label>Password ปัจจุบัน</label>
                    <input type="password" id="current-password" autocomplete="current-password" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Password ใหม่</label>
                    <input type="password" id="new-password" autocomplete="new-password" placeholder="••••••••">
                    <div class="pw-rules">
                        <div class="pw-rules-title">เงื่อนไข Password ใหม่:</div>
                        <div class="pw-rule fail" id="rule-length"><span class="icon"></span>ความยาวอย่างน้อย 8 ตัวอักษร</div>
                        <div class="pw-rule fail" id="rule-number"><span class="icon"></span>มีตัวเลขอย่างน้อย 1 ตัว (0-9)</div>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:1.25rem">
                    <label>ยืนยัน Password ใหม่</label>
                    <input type="password" id="confirm-password" autocomplete="new-password" placeholder="••••••••">
                </div>
                <div class="cp-actions">
                    <a href="/" class="btn btn-secondary">ยกเลิก</a>
                    <button class="btn btn-primary" id="btn-save">บันทึก</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        requireAuth();
        document.getElementById('topbar').innerHTML = renderTopbar();
        document.getElementById('user-email-label').textContent = getUserEmail() || '—';

        const btn = document.getElementById('btn-save');
        const curEl  = document.getElementById('current-password');
        const newEl  = document.getElementById('new-password');
        const confEl = document.getElementById('confirm-password');
        const ruleLength = document.getElementById('rule-length');
        const ruleNumber = document.getElementById('rule-number');

        newEl.addEventListener('input', () => {
            const v = newEl.value;
            ruleLength.classList.toggle('pass', v.length >= 8);
            ruleLength.classList.toggle('fail', v.length < 8);
            const hasDigit = /\d/.test(v);
            ruleNumber.classList.toggle('pass', hasDigit);
            ruleNumber.classList.toggle('fail', !hasDigit);
        });

        async function doChange() {
            clearAlert('alert-box');
            const curPw  = curEl.value;
            const newPw  = newEl.value;
            const conf   = confEl.value;
            if (!curPw || !newPw || !conf) { showAlert('alert-box', 'กรุณากรอกข้อมูลให้ครบ'); return; }
            if (newPw.length < 8)         { showAlert('alert-box', 'Password ใหม่ต้องมีอย่างน้อย 8 ตัวอักษร'); return; }
            if (!/\d/.test(newPw))        { showAlert('alert-box', 'Password ใหม่ต้องมีตัวเลขอย่างน้อย 1 ตัว'); return; }
            if (newPw !== conf)           { showAlert('alert-box', 'Password ใหม่และยืนยันไม่ตรงกัน'); return; }
            if (newPw === curPw)          { showAlert('alert-box', 'Password ใหม่ต้องต่างจากของเดิม'); return; }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> กำลังบันทึก...';
            try {
                await api.post('/api/auth/change-password', { current_password: curPw, new_password: newPw });
                toast.success('เปลี่ยน Password สำเร็จ');
                setTimeout(() => { window.location.href = '/'; }, 1200);
            } catch (e) {
                showAlert('alert-box', e.message || 'เปลี่ยน Password ไม่สำเร็จ');
                btn.disabled = false;
                btn.textContent = 'บันทึก';
            }
        }

        btn.addEventListener('click', doChange);
        confEl.addEventListener('keydown', e => { if (e.key === 'Enter') doChange(); });
    </script>
</body>
</html>
