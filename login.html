<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — DSC Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap">
    <link rel="stylesheet" href="/css/portal.css">
    <style>
        .login-card {
            width: 100%;
            max-width: 400px;
            animation: card-rise .5s cubic-bezier(.22,.61,.36,1);
        }
        @keyframes card-rise {
            from { opacity: 0; transform: translateY(20px) scale(.98); }
            to   { opacity: 1; transform: translateY(0)    scale(1); }
        }
        .header-block {
            text-align: center;
            margin-bottom: 28px;
        }
        .signup-link {
            text-align: center;
            margin-top: 18px;
            font-size: .86rem;
            color: var(--gray-600);
        }
        .signup-link a {
            color: var(--dhl-red);
            font-weight: 700;
            text-decoration: none;
        }
        .signup-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="center-screen">
        <div class="login-card">
            <div class="header-block">
                <div class="brand-badge">SMART EXPORT</div>
                <div class="brand-subtitle">DSC · CTC FG Export</div>
            </div>

            <div class="card">
                <div id="alert-box"></div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="you@example.com" autofocus autocomplete="username">
                </div>
                <div class="form-group" style="margin-bottom:.75rem">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                </div>
                <div style="text-align:right;margin-bottom:1.25rem">
                    <a href="/forgot-password.html" style="font-size:.8rem;color:var(--gray-500);text-decoration:none">ลืม password?</a>
                </div>
                <button class="btn btn-primary btn-block" id="btn-login">เข้าสู่ระบบ</button>

                <div class="signup-link">
                    ยังไม่มีบัญชี? <a href="/signup.html">สมัครที่นี่</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        // If already logged in → bounce to portal
        (async () => {
            if (await getCurrentSession()) {
                window.location.href = '/';
            }
        })();

        const btn = document.getElementById('btn-login');
        const emailEl    = document.getElementById('email');
        const passwordEl = document.getElementById('password');

        async function doLogin() {
            clearAlert('alert-box');
            const email    = emailEl.value.trim();
            const password = passwordEl.value;
            if (!email || !password) {
                showAlert('alert-box', 'กรุณากรอก email และ password');
                return;
            }
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> กำลังเข้าระบบ...';
            try {
                await login(email, password);
                window.location.href = '/';
            } catch (e) {
                // Supabase returns a clear message on bad credentials / banned user
                showAlert('alert-box', e.message || 'เข้าสู่ระบบไม่สำเร็จ');
                btn.disabled = false;
                btn.textContent = 'เข้าสู่ระบบ';
            }
        }

        btn.addEventListener('click', doLogin);
        passwordEl.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
        emailEl.addEventListener('keydown',    e => { if (e.key === 'Enter') passwordEl.focus(); });
    </script>
</body>
</html>
